<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TL PROJECT · Lounès Taïbi · Chef de projet créatif</title>
<meta name="description" content="De la stratégie de marque au projet livré. Direction de projet créatif & digital, branding et pilotage orientés résultats.">
<meta property="og:title" content="TL PROJECT · Lounès Taïbi">
<meta property="og:description" content="De la stratégie de marque au projet livré. Chef de projet créatif.">
<meta property="og:image" content="assets/logo.jpg">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --noir:#0B0B0C; --noir2:#111113; --panel:#17171A;
  --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.06);
  --jaune:#FFCC08; --jaune-soft:rgba(255,204,8,.12);
  --blanc:#FFFFFF; --gris:#A6A6AD; --gris2:#6E6E76;
  --ff:'Lexend',system-ui,sans-serif;
  --maxw:1140px; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--noir);color:var(--blanc);line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none;transition:color .3s,border-color .3s,background .3s}
img{display:block;max-width:100%}
button{font-family:var(--ff);cursor:pointer}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
::selection{background:var(--jaune);color:#000}

/* logo mark : clips the white corners of the jpg into a circle */
.mark{display:block;border-radius:50%;overflow:hidden;flex:none;background:#000}
.mark img{width:104%;height:104%;margin:-2%}

/* ---------- header ---------- */
.hd{position:sticky;top:0;z-index:60;background:rgba(11,11,12,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line2)}
.hd__in{display:flex;align-items:center;justify-content:space-between;height:64px;gap:14px}
.logo{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:.04em;font-size:15px;white-space:nowrap}
.logo .mark{width:34px;height:34px}
.logo span b{color:var(--jaune)}
.nv{display:flex;gap:26px;font-size:13.5px;color:var(--gris);font-weight:500}
.nv a:hover{color:#fff}
.hd__r{display:flex;align-items:center;gap:12px}
.lang{display:flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;font-size:12px;font-weight:600}
.lang button{background:none;border:none;color:var(--gris);padding:6px 12px}
.lang button.on{background:var(--jaune);color:#000}
.cta{display:inline-block;background:var(--jaune);color:#000;font-weight:700;font-size:13.5px;padding:10px 18px;border-radius:99px;border:none;transition:background .3s,transform .3s,box-shadow .3s}
.cta:hover{background:#ffd83e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,204,8,.22)}
@media(max-width:840px){.nv{display:none}}

/* ---------- motion : scroll reveal ---------- */
.rv{opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s ease}
.rv.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}}

/* ---------- hero ---------- */
.hero{padding:104px 0 76px;position:relative;overflow:hidden}
/* yellow glow following the cursor */
.hero__glow{position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(255,204,8,.14),transparent 65%);filter:blur(40px);pointer-events:none;transform:translate(-50%,-50%);left:70%;top:40%;transition:left .25s ease-out,top .25s ease-out;will-change:left,top}
@media(prefers-reduced-motion:reduce){.hero__glow{display:none}}
.hero__in{display:grid;grid-template-columns:1.25fr .75fr;gap:44px;align-items:center;position:relative}
.hero .mark{width:76px;height:76px;margin-bottom:26px;border:1px solid var(--line)}
.kick{display:block;font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--jaune)}
.hero h1{font-size:clamp(38px,6vw,66px);font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-top:16px;min-height:2.1em}
.hero h1 b{color:var(--jaune);font-weight:800}
/* typewriter caret */
.tw{color:var(--jaune)}
.tw::after{content:"";display:inline-block;width:3px;height:.85em;background:var(--jaune);margin-left:4px;vertical-align:baseline;animation:caret 1s steps(1) infinite}
@keyframes caret{50%{opacity:0}}
.hero__sub{margin-top:22px;font-size:16.5px;color:var(--gris);max-width:56ch;line-height:1.7;font-weight:300}
.hero__sub b{color:#fff;font-weight:600}
.hero__ctas{margin-top:30px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn-ghost{display:inline-block;border:1px solid var(--line);color:#fff;background:none;font-weight:600;font-size:13.5px;padding:12px 20px;border-radius:99px;transition:border-color .3s,color .3s,transform .3s}
.btn-ghost:hover{border-color:var(--jaune);color:var(--jaune);transform:translateY(-2px)}
.cta.big{padding:13px 24px;font-size:14.5px}
.hcard{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:28px}
.hcard__tag{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gris2);font-weight:600}
.hcard h3{font-size:20px;font-weight:700;margin-top:10px;line-height:1.3}
.hcard h3 b{color:var(--jaune)}
.hcard__rows{margin-top:20px}
.hcard__rows div{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-top:1px solid var(--line2);font-size:13.5px}
.hcard__rows dt{color:var(--gris)}
.hcard__rows dd{color:#fff;font-weight:600;text-align:right}
.hcard__foot{margin-top:18px;display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--gris)}
.hcard__foot i{width:8px;height:8px;border-radius:50%;background:var(--jaune);flex:none}
@media(max-width:900px){.hero__in{grid-template-columns:1fr}.hcard{max-width:520px}}

/* references : infinite marquee */
.refs{border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);background:var(--noir2);padding:20px 0;overflow:hidden}
.refs__label{display:block;text-align:center;color:var(--gris2);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:11px;margin-bottom:14px}
.marquee{display:flex;overflow:hidden;user-select:none;mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent)}
.marquee__track{display:flex;flex:none;align-items:center;gap:0;animation:scroll 28s linear infinite}
.marquee:hover .marquee__track{animation-play-state:paused}
.marquee__track span{flex:none;padding:0 30px;font-size:15px;font-weight:600;letter-spacing:.04em;color:var(--gris);white-space:nowrap}
.marquee__track em{flex:none;color:var(--jaune);font-style:normal}
@keyframes scroll{to{transform:translateX(-50%)}}
@media(prefers-reduced-motion:reduce){.marquee__track{animation:none}}

/* ---------- sections ---------- */
.sec{padding:128px 0}
.sec__hd{max-width:720px}
.sec__hd h2{font-size:clamp(26px,4vw,40px);font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-top:14px}
.sec__hd p{margin-top:16px;color:var(--gris);font-size:15px;line-height:1.7;font-weight:300}

/* expertise : 50/50 split, text left / native illustration right */
.xsplit{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-top:12px}
@media(max-width:900px){.xsplit{grid-template-columns:1fr}}
.exp{display:grid;grid-template-columns:1fr;gap:0;margin-top:32px}
.exp span{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line2);font-size:14.5px;color:#E8E8EC;transition:padding-left .3s,color .3s}
.exp span:hover{padding-left:8px;color:#fff}
.exp i{width:7px;height:7px;background:var(--jaune);border-radius:2px;flex:none}
.xfig{position:relative;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(160deg,var(--panel),var(--noir2));padding:44px 36px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.xfig::before{content:"";position:absolute;inset:auto -60px -60px auto;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,204,8,.16),transparent 70%)}
.xfig img{position:relative;width:100%;max-width:360px;height:auto;filter:drop-shadow(0 18px 36px rgba(0,0,0,.45))}
@media(max-width:900px){.xfig{max-width:480px;margin:0 auto}}

/* tools */
.tools{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:36px}
@media(max-width:860px){.tools{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.tools{grid-template-columns:1fr}}
.tool{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:16px 18px;transition:border-color .3s,transform .3s}
.tool:hover{border-color:var(--jaune);transform:translateY(-2px)}
.tool svg{width:26px;height:26px;flex:none;color:var(--jaune)}
.tool b{font-size:14px;font-weight:600;color:#E8E8EC;display:block}
.tool small{display:block;font-size:11.5px;color:var(--gris2);margin-top:2px}

/* projets */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:36px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.pcard-p{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);overflow:hidden;display:flex;flex-direction:column;transition:border-color .3s,transform .3s,box-shadow .3s}
.pcard-p:hover{border-color:var(--jaune);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.pcard-p .im{height:230px;overflow:hidden;background:var(--noir2)}
.pcard-p .im img{width:100%;height:100%;object-fit:cover;object-position:top;transition:transform .5s ease}
.pcard-p:hover .im img{transform:scale(1.04)}
.pcard-p .bd{padding:20px 22px 22px;display:flex;flex-direction:column;gap:9px;flex:1}
.pcard-p h3{font-size:17px;font-weight:700;line-height:1.3}
.pcard-p p{font-size:13.5px;color:var(--gris);line-height:1.55;font-weight:300}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;padding-top:10px}
.pill{font-size:10.5px;letter-spacing:.06em;color:var(--jaune);background:var(--jaune-soft);border-radius:99px;padding:4px 10px;font-weight:600}

/* offres */
.prix{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
.ocard{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:30px;display:flex;flex-direction:column;position:relative;transition:border-color .3s,transform .3s}
.ocard:hover{transform:translateY(-4px)}
.ocard.mid{border-color:var(--jaune)}
.ocard__tag{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gris2);font-weight:700}
.ocard.mid .ocard__tag{color:var(--jaune)}
.ocard__price{margin-top:14px;font-size:40px;font-weight:800;letter-spacing:-.02em}
.ocard__price small{font-size:14px;color:var(--gris);font-weight:400}
.ocard__was{display:inline-block;margin-right:10px;font-size:19px;font-weight:600;color:var(--gris2);text-decoration:line-through;vertical-align:baseline}
.ocard__deal{display:inline-block;margin-top:8px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--jaune)}
.ocard ul{list-style:none;margin-top:20px;flex:1}
.ocard li{font-size:13.5px;color:#DADAE0;padding:9px 0;border-top:1px solid var(--line2);display:flex;gap:10px;font-weight:300}
.ocard li::before{content:"→";color:var(--jaune);font-weight:700}
.ocard .cta{margin-top:24px;text-align:center}
.badge{position:absolute;top:-12px;right:22px;background:var(--jaune);color:#000;font-size:10.5px;font-weight:800;letter-spacing:.1em;border-radius:99px;padding:5px 12px;text-transform:uppercase}
@media(max-width:860px){.prix{grid-template-columns:1fr}}

/* contact */
.csplit{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:40px;align-items:start}
.cleft{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:32px}
.cleft h3{font-size:22px;font-weight:800}
.cleft>p{margin-top:12px;color:var(--gris);font-size:14.5px;font-weight:300;line-height:1.7}
.cinfo{margin-top:24px;display:grid;gap:13px}
.cinfo a,.cinfo div{display:flex;gap:12px;align-items:center;font-size:14px;color:#E8E8EC}
.cinfo i{width:8px;height:8px;background:var(--jaune);border-radius:50%;flex:none}
.cinfo a:hover{color:var(--jaune)}
form .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){form .row{grid-template-columns:1fr}}
.fld{margin-bottom:12px}
.fld input,.fld select,.fld textarea{width:100%;background:var(--noir2);border:1px solid var(--line);border-radius:10px;color:#fff;font-family:var(--ff);font-size:14px;padding:13px 15px;outline:none;font-weight:300}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--jaune)}
.fld textarea{min-height:130px;resize:vertical}
.hp{position:absolute;left:-6000px;opacity:0;height:0;overflow:hidden}
.fnote{font-size:11.5px;color:var(--gris2);margin-top:10px}
@media(max-width:860px){.csplit{grid-template-columns:1fr}}

/* ---------- page détail projet ---------- */
.page{display:none}
.page.on{display:block}
.pd__back{display:inline-flex;align-items:center;gap:9px;color:var(--gris);font-size:13.5px;font-weight:500;margin-top:34px}
.pd__back:hover{color:var(--jaune)}
.pd__hero{margin-top:26px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--panel)}
.pd__hero img{width:100%;max-height:520px;object-fit:cover;object-position:top}
.pd h1{font-size:clamp(30px,4.6vw,48px);font-weight:800;letter-spacing:-.02em;line-height:1.08;margin-top:32px}
.pd__meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.star{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:40px}
.scard{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:26px}
.scard h4{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--jaune);font-weight:700}
.scard p{margin-top:12px;font-size:14.5px;color:#DADAE0;line-height:1.7;font-weight:300}
.scard p b{color:#fff;font-weight:600}
.scard.res{grid-column:span 2;border-color:var(--jaune)}
@media(max-width:760px){.star{grid-template-columns:1fr}.scard.res{grid-column:span 1}}
.pd__gal{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
.pd__gal figure{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--panel)}
.pd__gal img{width:100%;max-height:300px;object-fit:cover;object-position:top}
@media(max-width:700px){.pd__gal{grid-template-columns:1fr}}
.pd__stack{margin-top:44px}
.pd__stack h3,.pd__more h3{font-size:18px;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.chip{border:1px solid var(--line);border-radius:99px;padding:9px 16px;font-size:13px;color:#E8E8EC;background:var(--noir2)}
.pd__more{margin-top:56px;padding-top:36px;border-top:1px solid var(--line2)}
.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
.mini a{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:18px}
.mini a:hover{border-color:var(--jaune)}
.mini h5{font-size:14px;font-weight:700;line-height:1.3}
.mini span{display:block;margin-top:7px;font-size:11.5px;color:var(--gris2)}
@media(max-width:700px){.mini{grid-template-columns:1fr}}

/* footer */
.ft{border-top:1px solid var(--line2);padding:40px 0 32px;background:var(--noir2)}
.ft__in{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.ft .logo .mark{width:30px;height:30px}
.ft__links{display:flex;gap:22px;font-size:13px;color:var(--gris);flex-wrap:wrap}
.ft__links a:hover{color:var(--jaune)}
.ft small{color:var(--gris2);font-size:12px}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hd">
  <div class="wrap hd__in">
    <a class="logo" href="#/"><span class="mark"><img src="assets/logo.jpg" alt="TL PROJECT"></span><span>TL <b>PROJECT</b></span></a>
    <nav class="nv">
      <a href="#/projets" data-i18n="nav_projects"></a>
      <a href="#/#offres" data-i18n="nav_offers"></a>
    </nav>
    <div class="hd__r">
      <div class="lang"><button id="btn-fr" onclick="setLang('fr')">FR</button><button id="btn-en" onclick="setLang('en')">EN</button></div>
      <a class="cta" href="#/#contact" data-i18n="nav_contact"></a>
    </div>
  </div>
</header>

<!-- ============ PAGE HOME ============ -->
<main class="page" id="page-home">
  <section class="hero" id="hero">
    <div class="hero__glow" id="hero-glow"></div>
    <div class="wrap hero__in">
      <div>
        <span class="mark"><img src="assets/logo.jpg" alt=""></span>
        <span class="kick" data-i18n="hero_kick"></span>
        <h1><span data-i18n="hero_t1"></span> <span class="tw" id="tw"></span> <span data-i18n="hero_t2"></span></h1>
        <p class="hero__sub" data-i18n-html="hero_sub"></p>
        <div class="hero__ctas">
          <a class="cta big" href="#/projets" data-i18n="hero_cta1"></a>
          <a class="btn-ghost" href="#/#contact" data-i18n="hero_cta2"></a>
        </div>
      </div>
      <aside class="hcard">
        <span class="hcard__tag" data-i18n="hc_tag"></span>
        <h3 data-i18n-html="hc_title"></h3>
        <div class="hcard__rows">
          <div><dt data-i18n="hc_r1k"></dt><dd data-i18n="hc_r1v"></dd></div>
          <div><dt data-i18n="hc_r2k"></dt><dd data-i18n="hc_r2v"></dd></div>
          <div><dt data-i18n="hc_r3k"></dt><dd data-i18n="hc_r3v"></dd></div>
          <div><dt data-i18n="hc_r4k"></dt><dd data-i18n="hc_r4v"></dd></div>
        </div>
        <div class="hcard__foot"><i></i><span data-i18n="hc_foot"></span></div>
      </aside>
    </div>
  </section>

  <div class="refs">
    <span class="refs__label" data-i18n="refs_label"></span>
    <div class="marquee">
      <div class="marquee__track" id="marquee-track"></div>
    </div>
  </div>

  <section class="sec" id="expertises">
    <div class="wrap">
      <div class="xsplit">
        <div class="rv">
          <div class="sec__hd">
            <span class="kick" data-i18n="exp_kick"></span>
            <h2 data-i18n="exp_title"></h2>
            <p data-i18n="exp_sub"></p>
          </div>
          <div class="exp" id="exp"></div>
        </div>
        <div class="xfig rv">
          <img src="assets/img/illu-tablette.png" alt="Illustration : direction de projet créatif sur tablette" loading="lazy">
        </div>
      </div>
    </div>
  </section>

  <section class="sec" id="outils">
    <div class="wrap">
      <div class="sec__hd rv">
        <span class="kick" data-i18n="tl_kick"></span>
        <h2 data-i18n="tl_title"></h2>
        <p data-i18n="tl_sub"></p>
      </div>
      <div class="tools rv" id="tools"></div>
    </div>
  </section>

  <section class="sec" id="projets">
    <div class="wrap">
      <div class="sec__hd rv">
        <span class="kick" data-i18n="pj_kick"></span>
        <h2 data-i18n="pj_title"></h2>
        <p data-i18n="pj_sub"></p>
      </div>
      <div class="grid rv" id="grid"></div>
      <div class="rv" style="text-align:center;margin-top:40px">
        <a class="btn-ghost" href="#/projets" data-i18n="pj_all"></a>
      </div>
    </div>
  </section>

  <section class="sec" id="offres">
    <div class="wrap">
      <div class="sec__hd rv">
        <span class="kick" data-i18n="of_kick"></span>
        <h2 data-i18n="of_title"></h2>
        <p data-i18n="of_sub"></p>
      </div>
      <div class="prix rv" id="prix"></div>
    </div>
  </section>

  <section class="sec" id="contact">
    <div class="wrap">
      <div class="sec__hd">
        <span class="kick" data-i18n="ct_kick"></span>
        <h2 data-i18n="ct_title"></h2>
      </div>
      <div class="csplit rv">
        <div class="cleft">
          <h3 data-i18n="ct_h"></h3>
          <p data-i18n="ct_p"></p>
          <div class="cinfo">
            <a href="mailto:lounestaibipro@gmail.com"><i></i>lounestaibipro@gmail.com</a>
            <a href="https://www.linkedin.com/in/lounestaibi-pro/" target="_blank" rel="noopener"><i></i>linkedin.com/in/lounestaibi-pro</a>
            <div><i></i><span data-i18n="ct_loc"></span></div>
          </div>
        </div>
        <form onsubmit="return sendMail(this,event)">

/* ================= APP ================= */
let LANG = localStorage.getItem("tl_lang") || "fr";
const $  = s=>document.querySelector(s);
const $$ = s=>Array.from(document.querySelectorAll(s));
const t  = k=>I18N[LANG][k];

function applyI18n(){
  document.documentElement.lang = LANG;
  $$("[data-i18n]").forEach(el=>{const v=t(el.dataset.i18n); if(v!=null)el.textContent=v;});
  $$("[data-i18n-html]").forEach(el=>{const v=t(el.dataset.i18nHtml); if(v!=null)el.innerHTML=v;});
  $$("[data-i18n-ph]").forEach(el=>{const v=t(el.dataset.i18nPh); if(v!=null)el.placeholder=v;});
  $("#btn-fr").classList.toggle("on",LANG==="fr");
  $("#btn-en").classList.toggle("on",LANG==="en");
}
function setLang(l){LANG=l;localStorage.setItem("tl_lang",l);renderAll();}

function renderExp(){
  $("#exp").innerHTML=t("exp_items").map(c=>`<span><i></i>${c}</span>`).join("");
}

 figma:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="15" cy="9" r="3"/><path d="M9 3h3v12H9a3 3 0 1 1 0-6 3 3 0 0 1 0-6h3M12 15v3a3 3 0 1 1-3-3"/><path d="M12 3h3a3 3 0 1 1 0 6h-3"/></svg>',
 notion:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8.5 16V8l7 8V8"/></svg>',
 agile:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v4h-4"/><path d="M12 8v4l3 2"/></svg>',
 cloud:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 18a4.5 4.5 0 1 1 .7-8.95A6 6 0 0 1 19.4 11 3.5 3.5 0 0 1 18 18Z"/></svg>',

const FEATURED=["orange-anoo","sap-transformation","estatesync","comet-meetings"];
/* ordre d'affichage de la page projets : profils mélangés (Orange, SaaS, marques, créatif) */

function renderGrid(){
  $("#grid").innerHTML=P.filter(p=>FEATURED.includes(p.slug)).map(pj=>cardHTML(pj)).join("");
}

function renderGridAll(){
  const list=ORDER.map(s=>P.find(p=>p.slug===s)).filter(Boolean);

function renderSubjects(){
  const sel=$("#ct-subject"); if(!sel)return;
  sel.innerHTML=t("subjects").map(s=>`<option>${s}</option>`).join("");
}

function renderDetail(slug){
  const pj=P.find(p=>p.slug===slug);
  const root=$("#pd-root");
  if(!pj){root.innerHTML="<p style='padding:80px 0'>404</p>";return;}
  const L=pj[LANG],S=t("star");
  const gal=pj.gal.length
    ?`<div class="pd__gal">${pj.gal.map(g=>`<figure><img src="${g}" alt="" loading="lazy"></figure>`).join("")}</div>`:"";
  const others=P.filter(x=>x.slug!==slug).slice(0,3).map(x=>
    `<a href="#/projet/${x.slug}"><h5>${x[LANG].t}</h5><span>${x[LANG].d}</span></a>`).join("");
  root.innerHTML=`
    <a class="pd__back" href="#/projets">← ${t("pd_back")}</a>
    <div class="pd__hero"><img src="${pj.img}" alt="${L.t}"></div>
    <h1>${L.t}</h1>
    <div class="pd__meta">${L.tags.map(x=>`<span class="pill">${x}</span>`).join("")}</div>
    ${gal}
    <div class="star">
      <div class="scard"><h4>${S.S}</h4><p>${L.S}</p></div>
      <div class="scard"><h4>${S.T}</h4><p>${L.T}</p></div>
      <div class="scard"><h4>${S.A}</h4><p>${L.A}</p></div>
      <div class="scard res"><h4>${S.R}</h4><p>${L.R}</p></div>
    </div>
    <div class="pd__stack"><h3>${t("pd_stack")}</h3>
      <div class="chips">${pj.stack.map(s=>`<span class="chip">${s}</span>`).join("")}</div></div>
    <div class="pd__more"><h3>${t("pd_more")}</h3><div class="mini">${others}</div></div>
    <div style="height:70px"></div>`;
  window.scrollTo(0,0);
}

/* ================= ROUTER ================= */
function route(){
  const h=location.hash||"#/";
  const detail=h.startsWith("#/projet/");
  const projects=!detail&&h.startsWith("#/projets");
  $("#page-home").classList.toggle("on",!detail&&!projects);
  $("#page-projects").classList.toggle("on",projects);
  $("#page-detail").classList.toggle("on",detail);
  if(detail){renderDetail(h.split("/")[2]);return;}
  if(projects){window.scrollTo(0,0);return;}
  const anchor=h.split("#")[2];
  if(anchor){setTimeout(()=>{const el=document.getElementById(anchor);el&&el.scrollIntoView();},30);}
  else window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);

/* formulaire → mailto */
function sendMail(f,ev){
  ev.preventDefault();
  if(f.website&&f.website.value)return false; /* bot */
  const d=new FormData(f);
  const subj=encodeURIComponent("[TL PROJECT] "+(d.get("subject")||"Contact")+" · "+(d.get("name")||""));
  const body=encodeURIComponent((d.get("message")||"")+"\n\n"+(d.get("name")||"")+" · "+(d.get("email")||""));
  alert(t("f_ok"));
  location.href=`mailto:lounestaibipro@gmail.com?subject=${subj}&body=${body}`;
  return false;
}

/* ================= MOTION ================= */
const REDUCED=window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* typewriter loop on the hero headline */
let twTimer=null;
function startTypewriter(){
  const el=$("#tw"); if(!el)return;
  clearTimeout(twTimer);
  const words=t("tw_words");
  if(REDUCED){el.textContent=words[0];return;}
  let w=0,i=0,del=false;
  (function tick(){
    const word=words[w];
    el.textContent=word.slice(0,i);
    if(!del&&i===word.length){del=true;twTimer=setTimeout(tick,1800);return;}
    if(del&&i===0){del=false;w=(w+1)%words.length;}
    i+=del?-1:1;
    twTimer=setTimeout(tick,del?38:75);
  })();
}

/* yellow glow following the cursor in the hero */
(function(){
  const hero=$("#hero"),glow=$("#hero-glow");
  if(!hero||!glow||REDUCED)return;
  hero.addEventListener("mousemove",e=>{
    const r=hero.getBoundingClientRect();
    glow.style.left=(e.clientX-r.left)+"px";
    glow.style.top=(e.clientY-r.top)+"px";
  });
})();

/* fade-in up on scroll */
const rvObs=new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");rvObs.unobserve(e.target);}});
},{threshold:.12});
function observeReveals(){$$(".rv:not(.in)").forEach(el=>rvObs.observe(el));}

/* light parallax on the expertise illustration */
(function(){
  if(REDUCED)return;
  window.addEventListener("scroll",()=>{
    const fig=document.querySelector(".xfig img"); if(!fig)return;
    const r=fig.getBoundingClientRect();
    const p=(r.top+r.height/2-innerHeight/2)/innerHeight;
    fig.style.transform=`translateY(${p*-18}px)`;
  },{passive:true});
})();

function renderAll(){
  applyI18n();renderExp();renderTools();renderMarquee();renderPrix();renderGrid();renderGridAll();renderSubjects();route();
  startTypewriter();observeReveals();
}
renderAll();
</script>
